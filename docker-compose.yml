services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8880}:8880"
    volumes:
      - ./data:/app/data:ro
    environment:
      - DATA_DIR=/app/data
      - BIOPORTAL_API_KEY=${BIOPORTAL_API_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3003}:80"
    depends_on:
      - backend
