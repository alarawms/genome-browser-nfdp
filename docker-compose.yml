version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: saudi-livestock-db
    environment:
      POSTGRES_DB: saudi_livestock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saudi-livestock-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: saudi-livestock-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/saudi_livestock
      DATA_PATH: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./src/backend:/app/src
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saudi-livestock-network

  # JBrowse 2 Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: saudi-livestock-frontend
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      JBROWSE_DATA_DIR: /app/data
    volumes:
      - ./src/frontend:/app
      - ./data:/app/data:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - saudi-livestock-network

volumes:
  postgres_data:
    driver: local

networks:
  saudi-livestock-network:
    driver: bridge
